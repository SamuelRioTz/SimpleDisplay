name: Bug Report
description: Report a bug to help us improve SimpleDisplay.
labels: [bug]
body:
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g., macOS 15.3"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: SimpleDisplay version
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: "e.g., MacBook Pro M3, Mac Mini M2"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open SimpleDisplay
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, display configuration, logs, etc.
