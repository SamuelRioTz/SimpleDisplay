name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build, sign, and create DMG
        run: make dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: .build/SimpleDisplay.dmg
          generate_release_notes: true
