name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build, sign, and create DMG
        run: make dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SimpleDisplay.dmg
          path: .build/SimpleDisplay.dmg
          retention-days: 14
